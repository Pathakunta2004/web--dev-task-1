<!DOCTYPE html>
<html>
<head>
<title>Air Pollution Prediction</title>
<style>
body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
padding:40px;
}
.container{
background:white;
padding:30px;
width:350px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px gray;
}
input{
width:90%;
padding:8px;
margin:5px;
}
button{
padding:10px 20px;
background:green;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>Air Pollution Predictor</h2>

<input type="number" id="pm25" placeholder="PM2.5"><br>
<input type="number" id="pm10" placeholder="PM10"><br>
<input type="number" id="no2" placeholder="NO2"><br>
<input type="number" id="so2" placeholder="SO2"><br>
<input type="number" id="co" placeholder="CO"><br>
<input type="number" id="o3" placeholder="O3"><br>

<button onclick="predictAQI()">Predict AQI</button>

<h3 id="result"></h3>
</div>

<script>
function predictAQI(){

let pm25 = parseFloat(document.getElementById("pm25").value);
let pm10 = parseFloat(document.getElementById("pm10").value);
let no2 = parseFloat(document.getElementById("no2").value);
let so2 = parseFloat(document.getElementById("so2").value);
let co = parseFloat(document.getElementById("co").value);
let o3 = parseFloat(document.getElementById("o3").value);

// Simple AQI formula (demo)
let aqi = (pm25*0.4)+(pm10*0.2)+(no2*0.1)+(so2*0.1)+(co*20)+(o3*0.1);

document.getElementById("result").innerHTML =
"Predicted AQI: " + aqi.toFixed(2);

}
</script>

</body>
</html>
